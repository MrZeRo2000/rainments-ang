@if (payments(); as payments) {
  @if (displayOptions(); as displayOptions) {
    <mat-table [dataSource]="payments" class="report-table">

      <ng-container matColumnDef="date">
        <mat-header-cell *matHeaderCellDef>Date</mat-header-cell>
        <mat-cell *matCellDef="let item">{{item.periodDate | date: "dd.MM.yyyy"}}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="group">
        <mat-header-cell *matHeaderCellDef>Group</mat-header-cell>
        <mat-cell *matCellDef="let item">{{item.paymentGroup?.name}}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="product">
        <mat-header-cell *matHeaderCellDef>Product</mat-header-cell>
        <mat-cell *matCellDef="let item">{{item.product?.name}}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="payment">
        <mat-header-cell *matHeaderCellDef class="num">Payment</mat-header-cell>
        <mat-cell *matCellDef="let item" class="num">{{item.paymentAmount | amount}}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="commission">
        <mat-header-cell *matHeaderCellDef class="num">Commission</mat-header-cell>
        <mat-cell *matCellDef="let item" class="num">{{item.commissionAmount | amount}}</mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns(); sticky: true"></mat-header-row>
      <mat-row
        *matRowDef="let row; columns: displayedColumns()"
        [style.background]="displayOptions.displayColors ? row.paymentGroup?.color : null"></mat-row>
    </mat-table>
  }
}
