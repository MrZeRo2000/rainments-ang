
<app-message></app-message>

@if (paymentObjectTotals(); as totals) {
  <div class="d-inline-flex align-items-center">
    <app-payments-date-selection (selectedDate)="onSelectDate($event)" [paymentObjectTotals]="totals"></app-payments-date-selection>
    <div class="ms-2">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0 p-2">
          <li aria-current="page"><h5 class="mb-0 text-nowrap">{{totals.paymentObject?.name}}</h5></li>
        </ol>
      </nav>
    </div>
    <div class="ms-2">
      <app-report-nav [itemId]="paymentObjectId" navigatePath="reports"></app-report-nav>
    </div>
  </div>

  <app-payments-table
    [paymentObjectId]="paymentObjectId"
    [paymentPeriodDate]="selectedDate()">
  </app-payments-table>
}

<app-core-loading-progress [loading]="readRepository.loadingSignal()"></app-core-loading-progress>
