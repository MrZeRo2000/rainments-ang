<div class="settings-layout">
  <app-core-nav-list-selector
    class="settings-nav"
    [items]="settingItems"
    [selected]="selectedItem()"
    (selectedChange)="onItemSelected($event)"
    >
  </app-core-nav-list-selector>

  <div class="settings-content">
    @if (selectedItem() === SettingItemEnumType.PAYMENT_OBJECTS) {
      <app-payment-objects-table></app-payment-objects-table>
    }
    @if (selectedItem() === SettingItemEnumType.PAYMENT_GROUPS) {
      <app-payment-groups-table></app-payment-groups-table>
    }
    @if (selectedItem() === SettingItemEnumType.PRODUCTS) {
      <app-products-table></app-products-table>
    }
    @if (selectedItem() === SettingItemEnumType.DATA_MANAGEMENT) {
      <app-data-management></app-data-management>
    }
  </div>
</div>
