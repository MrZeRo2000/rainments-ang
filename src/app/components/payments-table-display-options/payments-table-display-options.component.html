<button matIconButton [matMenuTriggerFor]="menu" aria-label="Display options">
  <mat-icon>settings</mat-icon>
</button>

<mat-menu #menu="matMenu" xPosition="before">
  <!-- Keep the menu open while toggling (stop clicks from closing it). -->
  <div class="display-options" (click)="$event.stopPropagation()">
    <mat-slide-toggle [checked]="paymentsTableDisplayOptions().showTooltips()" (change)="paymentsTableDisplayOptions().showTooltips.set($event.checked)">Show tooltips</mat-slide-toggle>
    <mat-slide-toggle [checked]="paymentsTableDisplayOptions().compactProducts()" (change)="paymentsTableDisplayOptions().compactProducts.set($event.checked)">Compact products</mat-slide-toggle>
    <mat-slide-toggle [checked]="paymentsTableDisplayOptions().compactTable()" (change)="paymentsTableDisplayOptions().compactTable.set($event.checked)">Compact table</mat-slide-toggle>
    <mat-slide-toggle [checked]="paymentsTableDisplayOptions().showTrend()" (change)="paymentsTableDisplayOptions().showTrend.set($event.checked)">Show trend</mat-slide-toggle>
    <mat-slide-toggle [checked]="paymentsTableDisplayOptions().showId()" (change)="paymentsTableDisplayOptions().showId.set($event.checked)">Show Id</mat-slide-toggle>
    <mat-slide-toggle [checked]="paymentsTableDisplayOptions().showCommission()" (change)="paymentsTableDisplayOptions().showCommission.set($event.checked)">Show Commission</mat-slide-toggle>
    <mat-slide-toggle [checked]="paymentsTableDisplayOptions().showSummary()" (change)="paymentsTableDisplayOptions().showSummary.set($event.checked)">Show Summary</mat-slide-toggle>
    <mat-divider></mat-divider>
    <mat-slide-toggle [checked]="paymentsTableDisplayOptions().displayColors()" (change)="paymentsTableDisplayOptions().displayColors.set($event.checked)">Display colors</mat-slide-toggle>
  </div>
</mat-menu>
