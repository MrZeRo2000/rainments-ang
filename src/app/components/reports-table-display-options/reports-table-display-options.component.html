<button matIconButton [matMenuTriggerFor]="menu" aria-label="Display options">
  <mat-icon>settings</mat-icon>
</button>

<mat-menu #menu="matMenu" xPosition="before">
  <!-- Keep the menu open while toggling (stop clicks from closing it). -->
  <form class="display-options" [formGroup]="displayOptionsForm" (click)="$event.stopPropagation()">
    <mat-slide-toggle formControlName="showDate">Show date</mat-slide-toggle>
    <mat-slide-toggle formControlName="showGroup">Show group</mat-slide-toggle>
    <mat-slide-toggle formControlName="showProduct">Show product</mat-slide-toggle>
    <mat-divider></mat-divider>
    <mat-slide-toggle formControlName="displayColors">Display colors</mat-slide-toggle>
  </form>
</mat-menu>
