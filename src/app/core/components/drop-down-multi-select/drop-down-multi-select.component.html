<button matButton="outlined" [matMenuTriggerFor]="menu">
  {{title()}}
  <mat-icon>arrow_drop_down</mat-icon>
</button>

<mat-menu #menu="matMenu">
  <!-- Keep the menu open while toggling items (stop clicks from closing it),
       mirroring the old [insideClick]="false". -->
  <div class="multi-select-menu" (click)="$event.stopPropagation()">
    @for (item of selectableItems(); track item.value) {
      <button mat-menu-item (click)="dropDownClick($event, item)">
        <mat-icon>{{item.isSelected ? 'check_box' : 'check_box_outline_blank'}}</mat-icon>
        <span>{{item.value}}</span>
      </button>
    }
  </div>
</mat-menu>
