<div class="save-dialog-actions">
  @if (editState()?.editMode === EditMode.EM_CREATE) {
    <button type="button" matButton="outlined" (click)="onCreate()" [disabled]="loading()">Create</button>
  }
  @if (editState()?.editMode === EditMode.EM_EDIT) {
    <button type="button" matButton="outlined" (click)="onSave()" [disabled]="loading()">Save</button>
  }
  <button type="button" matButton (click)="onCancel()" [disabled]="loading()">Cancel</button>
</div>
