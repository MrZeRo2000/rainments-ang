<div class="input-group mt-2 justify-content-end">
  @if (editState()?.editMode === EditMode.EM_CREATE) {
    <button type="button" class="btn btn-outline-primary" (click)="onCreate()" [disabled]="loading()">Create</button>
  }
  @if (editState()?.editMode === EditMode.EM_EDIT) {
    <button type="button" class="btn btn-outline-primary" (click)="onSave()" [disabled]="loading()">Save</button>
  }
  <button type="button" class="btn btn-outline-secondary ms-2" (click)="onCancel()" [disabled]="loading()">Cancel</button>
</div>
