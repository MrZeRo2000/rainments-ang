@if (value() !== null) {
  <span
    class="trend"
    [class.trend-up]="value() > 0"
    [class.trend-down]="value() < 0"
    >
    @if (value() > 0) {
      <mat-icon>arrow_drop_up</mat-icon>
    }
    @if (value() < 0) {
      <mat-icon>arrow_drop_down</mat-icon>
    }
    @if (value() === 0) {
      <mat-icon>remove</mat-icon>
    }
  </span>
}
