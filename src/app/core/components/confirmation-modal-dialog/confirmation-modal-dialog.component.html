<h4 mat-dialog-title class="confirm-title">
  <span>Confirmation</span>
  <button matIconButton mat-dialog-close aria-label="Close" class="confirm-close">
    <mat-icon>close</mat-icon>
  </button>
</h4>
<mat-dialog-content [innerHTML]="data.message"></mat-dialog-content>
<mat-dialog-actions class="confirm-actions">
  <button matButton="filled" class="confirm-button" mat-dialog-close="true">Confirm</button>
  <button matButton mat-dialog-close>Cancel</button>
</mat-dialog-actions>
